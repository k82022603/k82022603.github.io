      <rect width="8" height="8" fill="#1a1f2a"></rect>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2a3140" stroke-width="2"></line>
    </pattern>
    <pattern id="empty" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#0f1420"></rect>
      <circle cx="5" cy="5" r="0.7" fill="#3a4358"></circle>
    </pattern>
  </defs>

  
  <rect width="1000" height="600" fill="#0b0e15"></rect>

  
  <text x="20" y="28" fill="#e6e9f0" font-size="16" font-weight="700">BEFORE — 현재 레이아웃</text>
