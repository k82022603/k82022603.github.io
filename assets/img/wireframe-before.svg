  <rect x="20" y="64" width="960" height="40" rx="6" fill="#141a25" stroke="#2a3140"></rect>
  <text x="34" y="89" fill="#e6e9f0" font-size="12">Room  3f1f25d…</text>
  <text x="490" y="89" fill="#8a93a6" font-size="12" text-anchor="middle">0s</text>
  <rect x="880" y="74" width="40" height="20" rx="3" fill="#1f2735" stroke="#2a3140"></rect>
  <text x="900" y="88" fill="#cfd5e3" font-size="10" text-anchor="middle">테스트</text>
  <rect x="930" y="74" width="40" height="20" rx="3" fill="#1f2735" stroke="#2a3140"></rect>
  <text x="950" y="88" fill="#cfd5e3" font-size="10" text-anchor="middle">관전</text>

  
  <rect x="20" y="116" width="120" height="80" rx="6" fill="#141a25" stroke="#2a3140"></rect>
  <text x="32" y="134" fill="#e6e9f0" font-size="11">shark (GPT-4o)</text>
  <circle cx="34" cy="148" r="3" fill="#34d399"></circle><text x="44" y="152" fill="#8a93a6" font-size="10">대기중</text>
  <circle cx="34" cy="162" r="3" fill="#f87171"></circle><text x="44" y="166" fill="#8a93a6" font-size="10">등록 전</text>
  <rect x="32" y="176" width="96" height="6" fill="#1f2735"></rect>
  <rect x="32" y="176" width="60" height="6" fill="#475569"></rect>

  <rect x="20" y="208" width="120" height="80" rx="6" fill="#141a25" stroke="#f59e0b" stroke-width="2"></rect>
  <text x="32" y="226" fill="#e6e9f0" font-size="11">네선용  내 차례</text>
  <circle cx="34" cy="240" r="3" fill="#34d399"></circle><text x="44" y="244" fill="#8a93a6" font-size="10">대기중</text>
  <circle cx="34" cy="254" r="3" fill="#f87171"></circle><text x="44" y="258" fill="#8a93a6" font-size="10">등록 전</text>
  <rect x="32" y="268" width="96" height="6" fill="#1f2735"></rect>
  <rect x="32" y="268" width="80" height="6" fill="#f59e0b"></rect>

  <rect x="20" y="300" width="120" height="60" rx="6" fill="#141a25" stroke="#2a3140"></rect>
  <text x="32" y="318" fill="#8a93a6" font-size="10">드로우 더미</text>
  <text x="32" y="334" fill="#cfd5e3" font-size="10">76장</text>

  
  <rect x="160" y="116" width="660" height="40" fill="url(#empty)" stroke="#7c3aed" stroke-dasharray="6 4"></rect>
  <text x="490" y="140" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="700">⚠ 빈 공간 — 정보 밀도 낮음 (약 660 × 40 px)</text>

  
  <rect x="160" y="164" width="660" height="28" rx="4" fill="#3a2a10" stroke="#a16207"></rect>
  <text x="170" y="182" fill="#fbbf24" font-size="10">⚠  첫 번째 차례는 타일로 30점 이상 세트(들)를 만드는 것입니다…</text>

  
  <rect x="160" y="200" width="660" height="220" rx="8" fill="#0d2818" stroke="#1f3d2b"></rect>
  <text x="490" y="305" fill="#4b5d4f" font-size="13" text-anchor="middle">타일을 여기에 두세요</text>
  <text x="490" y="325" fill="#3f4d44" font-size="10" text-anchor="middle">새 그룹 또는 기존 세트에 추가하세요</text>
  <rect x="740" y="386" width="70" height="24" rx="4" fill="none" stroke="#34d399"></rect>
  <text x="775" y="402" fill="#34d399" font-size="10" text-anchor="middle">+ 새 그룹</text>

  
  <text x="160" y="440" fill="#8a93a6" font-size="11">내 패 (145점)</text>
  <text x="300" y="440" fill="#8a93a6" font-size="10">최초 등록 30점 이상 필요</text>
  <rect x="770" y="430" width="50" height="18" rx="3" fill="#1f2735"></rect>
  <text x="795" y="442" fill="#cfd5e3" font-size="10" text-anchor="middle">내 차례</text>

  
  <g transform="translate(160,452)">
    <g font-size="10" font-weight="700">
      <rect width="40" height="50" rx="4" fill="#dc2626"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">1</text>
      <g transform="translate(44,0)"><rect width="40" height="50" rx="4" fill="#eab308"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">1</text></g>
      <g transform="translate(88,0)"><rect width="40" height="50" rx="4" fill="#1d4ed8"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">2</text></g>
      <g transform="translate(132,0)"><rect width="40" height="50" rx="4" fill="#eab308"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">2</text></g>
      <g transform="translate(176,0)"><rect width="40" height="50" rx="4" fill="#1d4ed8"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">3</text></g>
