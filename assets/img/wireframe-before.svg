      <g transform="translate(264,0)"><rect width="40" height="50" rx="4" fill="#1d4ed8"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">6</text></g>
      <g transform="translate(308,0)"><rect width="40" height="50" rx="4" fill="#dc2626"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">7</text></g>
      <g transform="translate(352,0)"><rect width="40" height="50" rx="4" fill="#eab308"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">8</text></g>
      <g transform="translate(396,0)"><rect width="40" height="50" rx="4" fill="#1d4ed8"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">9</text></g>
      <g transform="translate(440,0)"><rect width="40" height="50" rx="4" fill="#dc2626"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">10</text></g>
      <g transform="translate(484,0)"><rect width="40" height="50" rx="4" fill="#eab308"></rect><text x="20" y="30" fill="#fff" text-anchor="middle">12</text></g>
    </g>
  </g>

  
  <rect x="160" y="520" width="270" height="32" rx="4" fill="#1f2735" stroke="#2a3140"></rect>
  <text x="295" y="540" fill="#cfd5e3" font-size="11" text-anchor="middle">드로우</text>
  <rect x="440" y="520" width="120" height="32" rx="4" fill="#141a25" stroke="#2a3140"></rect>
  <text x="500" y="540" fill="#8a93a6" font-size="11" text-anchor="middle">↺ 초기화</text>
  <rect x="570" y="520" width="250" height="32" rx="4" fill="#a16207"></rect>
  <text x="695" y="540" fill="#fff" font-size="11" text-anchor="middle" font-weight="700">제출</text>

  
  <rect x="840" y="116" width="140" height="320" rx="6" fill="#141a25" stroke="#2a3140"></rect>
  <text x="852" y="134" fill="#e6e9f0" font-size="11">힌트 리스트</text>
  <text x="852" y="150" fill="#8a93a6" font-size="9">최대 0번 스크롤 가능</text>
  <text x="852" y="180" fill="#8a93a6" font-size="9">아직 힌트가 없음</text>

  
  <g stroke="#7c3aed" fill="none" stroke-width="1.5">
    <path d="M 490 156 L 490 168" marker-end="url(#arr)"></path>
  </g>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"></path>
    </marker>
  </defs>

  
  <rect x="20" y="362" width="120" height="222" fill="url(#empty)" stroke="#7c3aed" stroke-dasharray="6 4"></rect>
  <text x="80" y="476" fill="#a78bfa" font-size="10" text-anchor="middle">빈 공간</text>
  <text x="80" y="490" fill="#a78bfa" font-size="10" text-anchor="middle">(좌측 하단)</text>
